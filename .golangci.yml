version: "2"
linters:
  default: standard
  disable:
    - errcheck # TODO: Enable and fix unchecked errors
    - gocritic # TODO: Enable for style improvements
    - gocyclo # TODO: Refactor complex functions
    - staticcheck # TODO: Fix deprecated APIs and style issues
    - unused # TODO: Clean up unused code
  settings:
    gocyclo:
      min-complexity: 50
    govet:
      disable:
        - printf # color.Sprintf with dynamic strings
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - govet
        text: non-constant format string
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
